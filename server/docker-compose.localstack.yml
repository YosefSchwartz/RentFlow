version: '3.8'

# LocalStack only - use with main docker-compose.yml for PostgreSQL
# Usage: docker-compose up -d && docker-compose -f docker-compose.localstack.yml up -d

services:
  localstack:
    image: localstack/localstack:3.4
    container_name: keynest-localstack
    ports:
      - "4566:4566"           # LocalStack Gateway
      - "4510-4559:4510-4559" # External service ports
    environment:
      - SERVICES=s3,secretsmanager
      - DEBUG=${DEBUG:-0}
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=eu-central-1
    volumes:
      - localstack-data:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init-aws.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  localstack-data:
    driver: local
